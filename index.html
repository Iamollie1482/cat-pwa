<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="貓日誌">
<meta name="theme-color" content="#FAF6EF">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>貓咪健康日誌</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --cr:#FAF6EF;--cr2:#F3EDE2;--cr3:#E8DFD0;
  --rose:#E8829A;--rose-l:#F5C6D2;--rose-p:#FBF0F3;
  --lav:#C4B4E4;
  --amb:#D4956A;--amb-l:#F5DFD0;
  --grn:#7BAF82;--grn-l:#D8EDDB;
  --blu:#7BB8E8;--blu-l:#DFF0FC;
  --tel:#5BBCB0;--tel-l:#D6F0EE;
  --red:#E05555;--red-l:#FDEAEA;
  --t1:#3D3330;--t2:#7A6E69;--t3:#A89E99;
  --bd:rgba(160,140,120,0.2);
  --r:15px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--cr);font-family:-apple-system,'PingFang TC',sans-serif;color:var(--t1)}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;overflow:hidden;height:100dvh}

.topbar{flex-shrink:0;padding:48px 18px 10px;display:flex;align-items:center;justify-content:space-between;background:var(--cr)}
.tb-title{font-size:17px;font-weight:700}
.ico-btn{width:36px;height:36px;border-radius:50%;background:var(--cr2);border:none;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}

.cat-bar{flex-shrink:0;display:flex;gap:7px;padding:0 18px 12px;overflow-x:auto;scrollbar-width:none}
.cat-bar::-webkit-scrollbar{display:none}
.chip{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;border:none;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--rose);color:#fff}
.chip.off{background:var(--cr2);color:var(--t2)}

.scroll{flex:1;overflow-y:auto;padding:0 18px 8px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}

.bot-nav{flex-shrink:0;display:flex;background:var(--cr);border-top:1px solid var(--bd);padding:6px 0 calc(8px + env(safe-area-inset-bottom))}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:transparent;cursor:pointer;padding:5px 0}
.nav-ico{font-size:20px}
.nav-lbl{font-size:10px;font-weight:500;color:var(--t3)}
.nav-btn.on .nav-lbl{color:var(--rose)}

.card{background:var(--cr);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.card2{background:var(--cr2);border-radius:var(--r);padding:14px;margin-bottom:10px}
.sec{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin:16px 0 8px}
.sec-note{font-size:10px;color:var(--t3);font-weight:400;text-transform:none;letter-spacing:0;margin-left:4px}
.big{font-size:28px;font-weight:700}
.sub{font-size:12px;color:var(--t3)}

.inp{width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid var(--cr3);background:var(--cr);font-size:14px;color:var(--t1);font-family:inherit}
.inp:focus{outline:none;border-color:var(--rose-l)}
.inp-sm{padding:8px 10px;border-radius:10px;border:1.5px solid var(--cr3);background:var(--cr);font-size:13px;color:var(--t1);font-family:inherit;text-align:center}
.inp-sm:focus{outline:none;border-color:var(--rose-l)}
.sel{padding:8px 10px;border-radius:10px;border:1.5px solid var(--cr3);background:var(--cr);font-size:13px;color:var(--t1);font-family:inherit;flex:1}
.sel:focus{outline:none;border-color:var(--rose-l)}
.textarea{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--cr3);background:var(--cr);font-size:13px;color:var(--t1);font-family:inherit;resize:none;min-height:60px;line-height:1.5}
.textarea:focus{outline:none;border-color:var(--rose-l)}

.btn{padding:9px 16px;border-radius:10px;border:none;background:var(--rose);color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn:active{transform:scale(.94)}
.btn-g{background:var(--cr2);color:var(--t2)}
.btn-del{width:27px;height:27px;border-radius:8px;border:none;background:var(--red-l);color:var(--red);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.row:last-child{margin-bottom:0}
.lbl{font-size:13px;color:var(--t2);white-space:nowrap}
.tag{display:inline-block;padding:3px 9px;border-radius:8px;font-size:11px;font-weight:600}
.tag-g{background:var(--grn-l);color:#27500A}
.tag-a{background:var(--amb-l);color:#633806}
.tag-r{background:var(--red-l);color:var(--red)}
.tag-x{background:var(--cr2);color:var(--t3)}

/* CALENDAR */
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mnav-btn{width:32px;height:32px;border-radius:50%;background:var(--cr2);border:none;cursor:pointer;font-size:18px;color:var(--t2)}
.cal-wrap{background:var(--cr2);border-radius:var(--r);padding:12px;margin-bottom:10px}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-dl{text-align:center;font-size:10px;font-weight:600;color:var(--t3);padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:background .12s}
.cell:active{transform:scale(.88)}
.cnum{font-size:13px;font-weight:500;color:var(--t1);line-height:1}
.cell.other .cnum{opacity:.3}
.cell.sel{background:var(--rose)}
.cell.sel .cnum{color:#fff}
.cell.tod .cnum{color:var(--rose);font-weight:700}
.cdots{display:flex;gap:2px;margin-top:3px;justify-content:center;flex-wrap:wrap;max-width:24px}
.cdot{width:4px;height:4px;border-radius:50%}
.cell.sel .cdot{opacity:.6}

/* COUNT */
.cnt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.cnt-card{background:var(--cr);border:1px solid var(--bd);border-radius:var(--r);padding:12px}
.cnt-lbl{font-size:11px;color:var(--t2);margin-bottom:7px;display:flex;align-items:center;gap:4px}
.cnt-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cnt-row{display:flex;align-items:center;gap:8px}
.cnt-val{font-size:28px;font-weight:700;flex:1}
.cnt-btns{display:flex;flex-direction:column;gap:5px}
.cnt-btn{width:28px;height:28px;border-radius:7px;background:var(--cr2);border:none;cursor:pointer;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center}
.cnt-btn:active{transform:scale(.85)}

/* CARE */
.care-list{background:var(--cr);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.care-row{display:flex;align-items:center;padding:11px 13px;border-bottom:1px solid var(--bd);gap:9px;cursor:pointer}
.care-row:last-child{border-bottom:none}
.care-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}

/* PROGRESS */
.prog-bar{height:9px;border-radius:6px;background:var(--cr3);overflow:hidden;margin:7px 0 4px}
.prog-fill{height:100%;border-radius:6px;background:var(--rose);transition:width .4s}
.prog-fill.over{background:var(--red)}

/* COMPACT REC ROWS */
.rec-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:0.5px solid var(--bd)}
.rec-lbl{flex:1;font-size:13px;font-weight:500;color:var(--t1);display:flex;align-items:center;gap:5px}
.rec-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.rec-val{font-size:17px;font-weight:700;min-width:24px;text-align:center;color:var(--t1)}
.rec-btn{width:26px;height:26px;border-radius:7px;background:var(--cr2);border:0.5px solid var(--bd);cursor:pointer;font-size:15px;font-weight:600;color:var(--t1);display:flex;align-items:center;justify-content:center}
.rec-btn:active{transform:scale(.88)}
.cat-tag{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600;background:var(--rose-l);color:var(--rose)}

/* WATER */
.water-log-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}
.water-log-row:last-child{border-bottom:none}

/* MEAL */
.meal-row{display:flex;align-items:center;gap:7px;padding:9px 0;border-bottom:1px solid var(--bd)}
.meal-row:last-child{border-bottom:none}

/* MISC */
.food-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--bd)}
.food-row:last-child{border-bottom:none}
.wh-row{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);padding:3px 0;border-bottom:1px solid var(--bd)}
.wh-row:last-child{border-bottom:none}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.s-card{background:var(--cr2);border-radius:var(--r);padding:12px}
.empty{text-align:center;padding:18px 0;font-size:13px;color:var(--t3)}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(50,30,20,.32);align-items:flex-end;justify-content:center;z-index:999}
.modal-bg.open{display:flex}
.modal{background:var(--cr);border-radius:22px 22px 0 0;padding:18px 20px calc(22px + env(safe-area-inset-bottom));width:100%;max-width:430px}
.modal-handle{width:34px;height:4px;border-radius:2px;background:var(--cr3);margin:0 auto 16px}
.modal h3{font-size:15px;font-weight:700;margin-bottom:13px}

input[type="time"]::-webkit-datetime-edit-ampm-field{display:none!important}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="tb-title" id="tb-title">🐾 橘子</div>
    <div id="sync-status" style="font-size:11px;color:var(--t3);margin-top:2px"></div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="ico-btn" id="btn-rename">✏️</button>

<div class="cat-bar" id="cat-bar"></div>

<div class="scroll" id="scroll">
  <div id="pg-cal"></div>
  <div id="pg-calorie" style="display:none"></div>
  <div id="pg-foods" style="display:none"></div>

<nav class="bot-nav">

<!-- CAT MODAL -->
<div class="modal-bg" id="modal-cat">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="mcat-title">新增貓咪</h3>

      <button class="btn btn-g" style="flex:1" id="mcat-cancel">取消</button>

</div>

<!-- SYNC SETTINGS MODAL -->
<div class="modal-bg" id="modal-fb">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>🏠 家庭房間碼</h3>
    <p style="font-size:13px;color:var(--t2);margin-bottom:16px;line-height:1.7">輸入同一個房間碼，就能與家人即時同步資料。<br>沒有房間碼的人各自獨立，不會互相影響。</p>

      <input class="inp" id="room-code-input" placeholder="例：cat-ab12-cd34" style="flex:1;font-family:monospace;font-size:15px">
      <button class="btn btn-g" id="btn-gen-room" style="white-space:nowrap;padding:9px 12px">隨機產生</button>
    </div>
    <div id="room-hint" style="font-size:12px;color:var(--t3);margin-bottom:14px;line-height:1.6">
      ① 自己點「隨機產生」建立新房間<br>② 把房間碼傳給家人<br>③ 家人輸入同一個碼後點「加入房間」
    </div>

    <div style="font-size:12px;font-weight:600;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">Google Sheets 備份（選填）</div>
    <input class="inp" id="gs-url" placeholder="Apps Script 網址" style="margin-bottom:14px">

    <div style="display:flex;gap:8px;margin-bottom:8px">

      <button class="btn" style="flex:1" id="fb-save">加入房間</button>

    <button id="fb-disconnect" style="width:100%;padding:9px;border-radius:10px;border:none;background:transparent;color:var(--red);font-size:13px;cursor:pointer;display:none">離開房間（改用本機儲存）</button>

<!-- CARE MODAL -->
<div class="modal-bg" id="modal-care">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="mcare-title">記錄日期</h3>
    <input type="date" class="inp" id="mcare-date" style="margin-bottom:12px">
    <div style="display:flex;gap:8px">
      <button class="btn btn-g" style="flex:1" id="mcare-cancel">取消</button>
      <button class="btn" style="flex:1" id="mcare-ok">儲存</button>
    </div>
  </div>

<script>
var SK = 'catAll_v4';
var D, curCat, curPage, viewY, viewM, selDate, curCareKey, catModalMode;
var todayD = new Date();
var todayStr = fmtDate(todayD);

function fmtDate(d) {
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function pad(n) { return String(n).padStart(2,'0'); }
function nowTime() { return pad(todayD.getHours()) + ':' + pad(todayD.getMinutes()); }

function defaultData() {
  return {
    cats: [{name:'橘子',weight:4,status:'1.2'},{name:'豆豆',weight:3.5,status:'1.2'}],
    records: {},
    shared: {},
    meals: {},
    foods: [
      {id:1,name:'O30 主食罐',grams:85,kcal:2.95},
      {id:2,name:'UC33',grams:80,kcal:3.04},
      {id:3,name:'餐包(綠)',grams:60,kcal:48.6},
      {id:4,name:'乾飼料',grams:30,kcal:110}
    ],
    presets: {},
    meds: {},
    nextId: 10
  };
}

// ===== FIREBASE 設定（寫死，所有人共用同一個資料庫） =====
var FB_CONFIG = {
  apiKey: "AIzaSyASq66pgOk1pjmTROYVXArDo0tGfSKFZC4",
  authDomain: "cat-journal-c1f5e.firebaseapp.com",
  projectId: "cat-journal-c1f5e",
  storageBucket: "cat-journal-c1f5e.firebasestorage.app",
  messagingSenderId: "7855997959",
  appId: "1:7855997959:web:1d3398df54b2b694a356a2"
};

// ===== FIREBASE (主要即時同步) =====
var ROOM_SK = 'catRoomCode';   // 房間碼存在本機
var GS_SK = 'catGSUrl';
var db = null;
var fbUnsubscribe = null;
var gsUrl = null;
var gsPending = null;
var currentRoom = null;        // 目前使用的房間碼

function getRoomCode() {
  try { return localStorage.getItem(ROOM_SK) || null; } catch(e) { return null; }
}
function saveRoomCode(code) {
  try { localStorage.setItem(ROOM_SK, code); } catch(e) {}
}
function getGSUrl() { try { return localStorage.getItem(GS_SK) || null; } catch(e) { return null; } }
function saveGSUrl(url) { try { localStorage.setItem(GS_SK, url); } catch(e) {} }

function setSyncStatus(msg, color) {
  var el = document.getElementById('sync-status');
  if (el) { el.textContent = msg; el.style.color = color||'var(--t3)'; }
}

// 產生隨機房間碼（形式：cat-XXXX-XXXX）
function genRoomCode() {
  var chars = 'abcdefghijkmnpqrstuvwxyz23456789';
  var a = '', b = '';
  for (var i=0;i<4;i++) a += chars[Math.floor(Math.random()*chars.length)];
  for (var j=0;j<4;j++) b += chars[Math.floor(Math.random()*chars.length)];
  return 'cat-' + a + '-' + b;
}

function initFirebase() {
  try {
    if (!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
    db = firebase.firestore();
    return true;
  } catch(e) { console.error('FB init error:', e); return false; }
}

// 房間文件路徑
function roomDoc() {
  return db.collection('rooms').doc(currentRoom);
}

function fbSave() {
  if (!db || !currentRoom) return;
  var payload = JSON.parse(JSON.stringify(D));
  payload._ts = Date.now();
  roomDoc().set(payload)
    .then(function() { setSyncStatus('🔥 已同步 (' + currentRoom + ')', 'var(--grn)'); gsExport(); })
    .catch(function(e) { setSyncStatus('⚠️ 同步失敗', 'var(--red)'); console.error(e); });
}

function fbLoad(callback) {
  if (!db || !currentRoom) { callback(false); return; }
  setSyncStatus('🔥 載入中...', 'var(--t3)');

  // 判斷本機是否有實際資料
  var localHasData = !!(D && D.cats && D.cats.length > 0 &&
    (Object.keys(D.records||{}).length > 0 ||
     Object.keys(D.shared||{}).length > 0 ||
     Object.keys(D.meals||{}).length > 0));
  var localTs = D._ts || 0;

  roomDoc().get()
    .then(function(doc) {
      if (doc.exists) {
        // 雲端房間有資料
        var cloudData = doc.data();
        var cloudTs = cloudData._ts || 0;

        if (localHasData && localTs > cloudTs) {
          // 本機資料比較新 → 上傳本機覆蓋雲端
          setSyncStatus('🔥 上傳本機資料...', 'var(--t3)');
          var payload = JSON.parse(JSON.stringify(D));
          payload._ts = Date.now();
          roomDoc().set(payload)
            .then(function() {
              setSyncStatus('🔥 已連線 (' + currentRoom + ')', 'var(--grn)');
              callback(true);
            })
            .catch(function(e) {
              setSyncStatus('⚠️ 上傳失敗，使用本機', 'var(--amb)');
              callback(false);
            });
        } else {
          // 雲端資料比較新或一樣 → 用雲端
          var ts = cloudData._ts; delete cloudData._ts;
          D = cloudData; D._ts = ts;
          try { localStorage.setItem(SK, JSON.stringify(D)); } catch(e) {}
          setSyncStatus('🔥 已連線 (' + currentRoom + ')', 'var(--grn)');
          callback(true);
        }
      } else {
        // 雲端房間不存在
        if (localHasData) {
          // 本機有資料 → 上傳到新房間（不管來源是什麼）
          setSyncStatus('🔥 建立房間，上傳資料...', 'var(--t3)');
          var payload2 = JSON.parse(JSON.stringify(D));
          payload2._ts = Date.now();
          roomDoc().set(payload2)
            .then(function() {
              setSyncStatus('🔥 已連線 (' + currentRoom + ')', 'var(--grn)');
              callback(true);
            })
            .catch(function(e) {
              setSyncStatus('⚠️ 上傳失敗，使用本機', 'var(--amb)');
              callback(false);
            });
        } else {
          // 本機也沒資料 → 全新狀態直接連線
          setSyncStatus('🔥 已連線（新房間）', 'var(--grn)');
          callback(true);
        }
      }
    })
    .catch(function(e) {
      setSyncStatus('⚠️ 連線失敗，使用本機', 'var(--amb)');
      callback(false);
    });
}

function fbListen() {
  if (!db || !currentRoom) return;
  if (fbUnsubscribe) fbUnsubscribe();
  fbUnsubscribe = roomDoc().onSnapshot(function(doc) {
    if (!doc.exists || doc.metadata.hasPendingWrites) return;
    var data = doc.data();
    if (!data._ts || data._ts <= (D._ts||0)) return;
    var ts = data._ts; delete data._ts;
    D = data; D._ts = ts;
    try { localStorage.setItem(SK, JSON.stringify(D)); } catch(e) {}
    setSyncStatus('🔥 已更新', 'var(--grn)');
    renderCatBar();
    if (curPage==='cal'){buildCal();buildDayPanel();}
    else if (curPage==='calorie') buildCaloriePage();
    else if (curPage==='foods') buildFoodsPage();
    else if (curPage==='settings') buildSettingsPage();
  }, function(e){ console.error('FB snapshot:', e); });
}

// ===== GOOGLE SHEETS (單向匯出) =====
function gsPost(payload) {
  if (!gsUrl) return;
  fetch(gsUrl, {method:'POST', body:JSON.stringify(payload)})
    .then(function(r){return r.json();})
    .then(function(d){if(!d.ok) console.warn('GS:', d.message);})
    .catch(function(e){console.warn('GS error:', e);});
}

function gsExport() {
  if (!gsUrl) return;
  clearTimeout(gsPending);
  gsPending = setTimeout(function() {
    D.cats.forEach(function(cat) {
      var r = D.records[cat.name+'|'+selDate] || {};
      var meals = D.meals[cat.name+'|'+selDate] || [];
      var s = D.shared[selDate] || {};
      var mealDetails = meals.map(function(m) {
        var f = foodById(m.foodId);
        return {time:m.time, name:f?f.name:'?', portions:m.portions, kcal:f?f.kcal*m.portions:0};
      });
      gsPost({
        action:'syncDay', date:selDate, catName:cat.name,
        rec:{weight:r.weight||'', kcal:Math.round(mealDetails.reduce(function(a,m){return a+m.kcal;},0)*10)/10,
          dailyTarget:calcDaily(cat), vomit:r.vomit||0, care:r.care||{}, notes:r.notes||''},
        shared:s, meals:mealDetails,
        meds:(D.meds[cat.name]||[]).map(function(mn){return {name:mn,given:!!(r.meds&&r.meds[mn])};})
      });
    });
    gsPost({action:'syncFoods', foods:D.foods});
  }, 2000);
}

function loadD() {
  try { var r = localStorage.getItem(SK); if (r) return JSON.parse(r); } catch(e) {}
  return defaultData();
}
function saveD() {
  try { localStorage.setItem(SK, JSON.stringify(D)); } catch(e) {}
  if (db) { fbSave(); }
  else if (gsUrl) { gsExport(); }
}

function catObj() { return D.cats[curCat]; }
function catN() { return catObj() ? catObj().name : ''; }

function getRec(date) {
  var k = catN() + '|' + date;
  if (!D.records[k]) D.records[k] = {weight:'', notes:'', meds:{}, care:{}, vomit:0};
  if (D.records[k].vomit === undefined) D.records[k].vomit = 0;
  return D.records[k];
}
function getShared(date) {
  if (!D.shared[date]) D.shared[date] = {pee:0, poop:0, vomitUnknown:0, waterLogs:[]};
  if (D.shared[date].vomitUnknown === undefined) D.shared[date].vomitUnknown = 0;
  return D.shared[date];
}
function getMeals(date) {
  var k = catN() + '|' + date;
  if (!D.meals[k]) D.meals[k] = [];
  return D.meals[k];
}
function getCatMeds() {
  if (!D.meds[catN()]) D.meds[catN()] = [];
  return D.meds[catN()];
}
function getCatPresets() {
  if (!D.presets) D.presets = {};
  if (!D.presets['shared']) D.presets['shared'] = [];
  return D.presets['shared'];
}

function calcRer(w) { return 30 * parseFloat(w) + 70; }
function calcDaily(c) {
  return Math.round(calcRer(c.weight) * (parseFloat(c.status) || 1.2) * 10) / 10;
}
function calcAte(date) {
  var meals = getMeals(date);
  var total = 0;
  for (var i = 0; i < meals.length; i++) {
    var f = foodById(meals[i].foodId);
    if (f) total += f.kcal * meals[i].portions;
  }
  return Math.round(total * 10) / 10;
}
function foodById(id) {
  for (var i = 0; i < D.foods.length; i++) if (D.foods[i].id === id) return D.foods[i];
  return null;
}

function getDots(date) {
  var s = D.shared[date];
  var k = catN() + '|' + date;
  var r = D.records[k];
  var d = [];
  if (s && s.pee > 0) d.push('pee');
  if (s && s.poop > 0) d.push('poop');
  if (s && s.vomitUnknown > 0) d.push('vomit');
  if (s && s.waterLogs && s.waterLogs.length > 0) d.push('water');
  if (r && r.weight) d.push('weight');
  if (D.meals[k] && D.meals[k].length > 0) d.push('meal');
  if (r && r.vomit > 0) d.push('vomit');
  return d;
}

var DOT_COLOR = {pee:'var(--blu)', poop:'var(--amb)', water:'var(--tel)', weight:'var(--grn)', meal:'var(--rose)', vomit:'var(--red)'};

function lastCareDate(key) {
  var best = null;
  var entries = Object.keys(D.records);
  for (var i = 0; i < entries.length; i++) {
    var k = entries[i];
    if (k.indexOf(catN() + '|') === 0 && D.records[k].care && D.records[k].care[key]) {
      var dt = k.split('|')[1];
      if (!best || dt > best) best = dt;
    }
  }
  return best;
}

// ===== CALENDAR =====
var MN = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function changeMonth(d) {
  viewM += d;
  if (viewM > 11) { viewM = 0; viewY++; }
  if (viewM < 0) { viewM = 11; viewY--; }
  buildCal();
}

function buildCal() {
  var first = new Date(viewY, viewM, 1).getDay();
  var dim = new Date(viewY, viewM+1, 0).getDate();
  var prev = new Date(viewY, viewM, 0).getDate();
  var cells = '';

  function mkCell(d, ds, other) {
    var isTod = ds===todayStr, isSel = ds===selDate;
    var cls = 'cell' + (other?' other':'') + (isSel?' sel':isTod?' tod':'');
    var dots = getDots(ds);
    var dotsHtml = '';
    for (var di = 0; di < Math.min(dots.length, 5); di++) {
      dotsHtml += '<span class="cdot" style="background:' + DOT_COLOR[dots[di]] + '"></span>';
    }
    return '<div class="' + cls + '" data-ds="' + ds + '"><span class="cnum">' + d + '</span><div class="cdots">' + dotsHtml + '</div></div>';
  }

  for (var i = 0; i < first; i++) {
    var d = prev - first + 1 + i;
    cells += mkCell(d, fmtDate(new Date(viewY, viewM-1, d)), true);
  }
  for (var d2 = 1; d2 <= dim; d2++) {
    cells += mkCell(d2, fmtDate(new Date(viewY, viewM, d2)), false);
  }
  var rem = (first+dim)%7===0 ? 0 : 7-(first+dim)%7;
  for (var i2 = 1; i2 <= rem; i2++) {
    cells += mkCell(i2, fmtDate(new Date(viewY, viewM+1, i2)), true);
  }

  var dayLabels = ['日','一','二','三','四','五','六'];
  var labelColors = ['color:var(--rose)','','','','','','color:var(--lav)'];
  var hdr = '';
  for (var li = 0; li < 7; li++) {
    hdr += '<div class="cal-dl" style="' + labelColors[li] + '">' + dayLabels[li] + '</div>';
  }

  var legend = '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">';
  var legendItems = [['var(--blu)','小便'],['var(--amb)','大便'],['var(--tel)','飲水'],['var(--grn)','體重'],['var(--rose)','用餐'],['var(--red)','嘔吐']];
  for (var li2 = 0; li2 < legendItems.length; li2++) {
    legend += '<div style="display:flex;align-items:center;gap:4px"><span class="cdot" style="width:7px;height:7px;background:' + legendItems[li2][0] + '"></span><span class="sub">' + legendItems[li2][1] + '</span></div>';
  }
  legend += '</div>';

  var html = '<div class="mnav">';
  html += '<button class="mnav-btn" id="btn-prev-month">‹</button>';
  html += '<span style="font-size:15px;font-weight:600">' + viewY + ' 年 ' + MN[viewM] + '</span>';
  html += '<button class="mnav-btn" id="btn-next-month">›</button></div>';
  html += '<div class="cal-wrap"><div class="cal-hdr">' + hdr + '</div>';
  html += '<div class="cal-grid" id="cal-grid">' + cells + '</div></div>';
  html += legend;
  html += '<div id="day-panel"></div>';

  document.getElementById('pg-cal').innerHTML = html;
  document.getElementById('btn-prev-month').onclick = function() { changeMonth(-1); };
  document.getElementById('btn-next-month').onclick = function() { changeMonth(1); };

  var cellEls = document.getElementById('cal-grid').querySelectorAll('.cell');
  for (var ci = 0; ci < cellEls.length; ci++) {
    cellEls[ci].addEventListener('click', (function(ds) {
      return function() { selectDate(ds); };
    })(cellEls[ci].getAttribute('data-ds')));
  }

  buildDayPanel();
}

  setTimeout(function() { document.getElementById('scroll').scrollTop = 360; }, 50);
}

    for (var mi = 0; mi < meals.length; mi++) {
      var mf = foodById(meals[mi].foodId);
      if (!mf) continue;
      html += '<div class="meal-row"><span style="font-size:12px;color:var(--t3);width:36px;flex-shrink:0">' + meals[mi].time + '</span>';
      html += '<div style="flex:1"><div style="font-size:13px;font-weight:500">' + mf.name + ' ×' + meals[mi].portions + '</div>';
      html += '<div class="sub">' + (mf.grams*meals[mi].portions).toFixed(0) + 'g</div></div>';
      html += '<span style="font-size:12px;color:var(--t2)">' + (mf.kcal*meals[mi].portions).toFixed(1) + ' kcal</span>';
      html += '<button class="btn-del day-meal-del" data-mid="' + meals[mi].id + '">✕</button></div>';
    }
    html += '</div>';
  } else {
    html += '<div style="margin-top:6px;font-size:12px;color:var(--t3)">前往「🍽️ 熱量」分頁新增用餐</div>';
  }
  html += '</div>';

  // 護理
  html += '<div class="sec">護理紀錄 — ' + catN() + '</div>';
  html += '<div class="care-list">';
  for (var ci = 0; ci < CARE_ITEMS.length; ci++) {
    var item = CARE_ITEMS[ci];
    var last = lastCareDate(item.key);
    var ago = last ? Math.floor((new Date() - new Date(last)) / 86400000) : null;
    var badge = ago===null ? '<span class="tag tag-x">未記錄</span>'
      : ago >= item.days ? '<span class="tag tag-a">該做了</span>'
      : '<span class="tag tag-g">' + ago + '天前</span>';
    html += '<div class="care-row" data-care="' + item.key + '">';
    html += '<div class="care-ico" style="background:' + item.bg + '">' + item.ico + '</div>';
    html += '<div style="flex:1"><div style="font-size:13px;font-weight:500">' + item.name + '</div>';
    html += '<div style="font-size:11px;color:var(--t3)">' + (last||'點擊記錄') + '</div></div>';
    html += badge + '</div>';
  }
  // 嘔吐（獨立計次，不需要日期）
  html += '<div class="care-row" style="cursor:default">';
  html += '<div class="care-ico" style="background:#FDEAEA">🤢</div>';
  html += '<div style="flex:1"><div style="font-size:13px;font-weight:500">嘔吐次數</div>';
  html += '<div style="font-size:11px;color:var(--t3)">' + catN() + ' 專屬</div></div>';
  html += '<div style="display:flex;align-items:center;gap:6px">';
  html += '<button class="rec-btn" data-t="vomit" data-d="-1">−</button>';
  html += '<span style="font-size:17px;font-weight:700;min-width:24px;text-align:center" id="vom-v">' + (r.vomit||0) + '</span>';
  html += '<button class="rec-btn" data-t="vomit" data-d="1">+</button>';
  html += '</div></div>';
  html += '</div>';

  // 體重
  html += '<div class="sec">體重 — ' + catN() + '</div>';
  html += '<div class="card"><div class="row">';
  html += '<input class="inp-sm" type="number" id="w-inp" step="0.01" min="0" max="20" placeholder="kg" value="' + (r.weight||'') + '" style="width:90px">';
  html += '<span class="lbl">公斤</span><button class="btn" style="margin-left:auto" id="btn-save-weight">儲存</button></div>';
  if (recentW.length > 1) {
    html += '<div style="margin-top:8px">';
    for (var wi = 0; wi < recentW.length; wi++) {
      html += '<div class="wh-row"><span style="color:var(--t3)">' + recentW[wi].dt + '</span><span style="font-weight:600">' + recentW[wi].w + ' kg</span></div>';
    }
    html += '</div>';
  }
  html += '</div>';

  // 餵藥
  if (meds.length > 0) {
    html += '<div class="sec">餵藥紀錄 — ' + catN() + '</div>';
    for (var medi = 0; medi < meds.length; medi++) {
      var given = r.meds && r.meds[meds[medi]];
      html += '<div class="card" style="display:flex;align-items:center;gap:9px;padding:11px 13px;margin-bottom:8px;' + (given?'background:var(--rose-p);border-color:var(--rose-l)':'') + '">';
      html += '<div class="med-chk" data-medi="' + medi + '" style="width:24px;height:24px;border-radius:7px;border:1.5px solid ' + (given?'var(--rose)':'var(--cr3)') + ';background:' + (given?'var(--rose)':'var(--cr2)') + ';display:flex;align-items:center;justify-content:center;cursor:pointer;color:' + (given?'#fff':'transparent') + ';font-size:13px;flex-shrink:0">✓</div>';
      html += '<span style="flex:1;font-size:13px;font-weight:500">' + meds[medi] + '</span></div>';
    }
  }

  // 備註
  html += '<div class="sec">備註 — ' + catN() + '</div>';
  html += '<textarea class="textarea" id="notes-inp" placeholder="記錄顏色、形狀、異常狀況...">' + (r.notes||'') + '</textarea>';
  html += '<button class="btn" id="save-day-btn" style="width:100%;margin:12px 0 22px;padding:13px;font-size:15px">儲存紀錄</button>';

  dp.innerHTML = html;

  // Bind events
  document.getElementById('btn-save-weight').onclick = saveWeight;
  document.getElementById('save-day-btn').onclick = saveDay;

  var cntBtns = dp.querySelectorAll('.rec-btn');
  for (var bi = 0; bi < cntBtns.length; bi++) {
    cntBtns[bi].onclick = (function(t, d) {
      return function() {
        if (t === 'vomit') { chVomit(d); }
        else { chShared(t, d); }
      };
    })(cntBtns[bi].getAttribute('data-t'), parseInt(cntBtns[bi].getAttribute('data-d')));
  }

  // water inline events
  var addWaterBtn = document.getElementById('btn-add-water');
  if (addWaterBtn) addWaterBtn.onclick = addWaterLog;
  var addedEl = document.getElementById('w-added');
  var leftEl = document.getElementById('w-left');
  function calcPreview() {
    var a = parseFloat(addedEl ? addedEl.value : 0) || 0;
    var l = parseFloat(leftEl ? leftEl.value : 0) || 0;
    var calc = document.getElementById('w-calc');
    if (calc) calc.textContent = a > 0 ? '= ' + Math.max(0, a-l) + ' ml' : '';
  }
  if (addedEl) addedEl.addEventListener('input', calcPreview);
  if (leftEl) leftEl.addEventListener('input', calcPreview);
  var wlogDels = dp.querySelectorAll('.wlog-del');
  for (var wdi = 0; wdi < wlogDels.length; wdi++) {
    wlogDels[wdi].addEventListener('click', (function(wi) {
      return function() { delWaterLog(wi); };
    })(parseInt(wlogDels[wdi].getAttribute('data-wi'))));
  }

  var careRows = dp.querySelectorAll('.care-row');
  for (var cri = 0; cri < careRows.length; cri++) {
    careRows[cri].addEventListener('click', (function(key) {
      return function() { openCareModal(key); };
    })(careRows[cri].getAttribute('data-care')));
  }

  var medChks = dp.querySelectorAll('.med-chk');
  for (var mci = 0; mci < medChks.length; mci++) {
    medChks[mci].addEventListener('click', (function(idx) {
      return function() { toggleMed(idx); };
    })(parseInt(medChks[mci].getAttribute('data-medi'))));
  }

  // 日曆頁用餐刪除
  var dayMealDels = dp.querySelectorAll('.day-meal-del');
  for (var dmd = 0; dmd < dayMealDels.length; dmd++) {
    dayMealDels[dmd].addEventListener('click', (function(mid) {
      return function() {
        var k = catN() + '|' + selDate;
        D.meals[k] = (D.meals[k]||[]).filter(function(m) { return m.id !== mid; });
        saveD(); renderCal_light(); buildDayPanel();
      };
    })(parseInt(dayMealDels[dmd].getAttribute('data-mid'))));
  }

  buildWaterCard();
}

// ===== WATER CARD =====
function buildWaterCard() {
  var wc = document.getElementById('water-card');
  if (!wc) return;
  var s = getShared(selDate);
  var logs = s.waterLogs || [];
  var total = 0;
  for (var i = 0; i < logs.length; i++) total += logs[i].drunk || 0;

  var html = '';
  if (logs.length > 0) {
    html += '<div style="font-size:20px;font-weight:700;color:var(--tel);margin-bottom:8px">' + total + ' <span style="font-size:13px;font-weight:400;color:var(--t3)">ml 今日總飲水</span></div>';
    for (var i2 = 0; i2 < logs.length; i2++) {
      html += '<div style="margin-bottom:6px">';
      html += '<div style="display:flex;align-items:center;gap:6px;font-size:13px">';
      html += '<span style="color:var(--t3);width:32px;flex-shrink:0;font-weight:500">第' + (i2+1) + '次</span>';
      html += '<span style="font-weight:600;color:var(--tel)">' + logs[i2].drunk + ' ml</span>';
      html += '<button class="btn-del wlog-del" data-wi="' + i2 + '" style="margin-left:auto">✕</button></div>';
      html += '<div style="margin-left:38px;font-size:11px;color:var(--t3)">加 ' + logs[i2].added + 'ml − 剩 ' + logs[i2].left + 'ml</div>';
      html += '</div>';
    }
    html += '<div style="height:4px"></div>';
  } else {
    html += '<div class="empty" style="padding:10px 0">尚未記錄今日飲水</div>';
  }

  var wDef2 = D.waterDefault || 320;
  html += '<div style="margin-top:10px;background:var(--cr2);border-radius:11px;padding:12px">';
  html += '<div style="font-size:11px;color:var(--t3);margin-bottom:8px;font-weight:600">新增換水紀錄</div>';
  html += '<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px">';
  html += '<span style="font-size:12px;color:var(--t2);width:52px;flex-shrink:0">加水量</span>';
  html += '<input class="inp-sm" type="number" id="w-added" value="' + wDef2 + '" min="0" style="width:80px">';
  html += '<span style="font-size:12px;color:var(--t3)">ml</span></div>';
  html += '<div style="display:flex;gap:6px;align-items:center;margin-bottom:10px">';
  html += '<span style="font-size:12px;color:var(--t2);width:52px;flex-shrink:0">剩餘量</span>';
  html += '<input class="inp-sm" type="number" id="w-left" placeholder="ml" min="0" style="width:80px">';
  html += '<span style="font-size:12px;color:var(--t3)">ml</span></div>';
  html += '<div style="display:flex;align-items:center;gap:8px">';
  html += '<span class="sub" id="w-calc" style="flex:1"></span>';
  html += '<button class="btn" id="btn-add-water" style="background:var(--tel)">記錄</button></div></div>';

  wc.innerHTML = html;

  var delBtns = wc.querySelectorAll('.wlog-del');
  for (var di = 0; di < delBtns.length; di++) {
    delBtns[di].addEventListener('click', (function(wi) {
      return function() { delWaterLog(wi); };
    })(parseInt(delBtns[di].getAttribute('data-wi'))));
  }

  document.getElementById('btn-add-water').onclick = addWaterLog;

  var addedEl = document.getElementById('w-added');
  var leftEl = document.getElementById('w-left');
  function calcPreview() {
    var a = parseFloat(addedEl.value) || 0;
    var l = parseFloat(leftEl.value) || 0;
    var calc = document.getElementById('w-calc');
    if (calc) calc.textContent = a > 0 ? '飲水量 = ' + Math.max(0, a-l) + ' ml' : '';
  }
  addedEl.addEventListener('input', calcPreview);
  leftEl.addEventListener('input', calcPreview);
}

function addWaterLog() {
  var added = parseFloat(document.getElementById('w-added').value) || 0;
  var left = parseFloat(document.getElementById('w-left').value) || 0;
  if (!added) { alert('請輸入加水量'); return; }
  var drunk = Math.max(0, added - left);
  var s = getShared(selDate);
  s.waterLogs.push({added:added, left:left, drunk:drunk});
  saveD(); renderCal_light(); buildWaterCard();
}

function delWaterLog(i) {
  var s = getShared(selDate);
  s.waterLogs.splice(i, 1);
  saveD(); renderCal_light(); buildWaterCard();
}

// light re-render (just dots, no full rebuild)
function renderCal_light() {
  var cells = document.querySelectorAll('#cal-grid .cell');
  for (var i = 0; i < cells.length; i++) {
    var ds = cells[i].getAttribute('data-ds');
    var dots = getDots(ds);
    var dotsHtml = '';
    for (var di = 0; di < Math.min(dots.length, 5); di++) {
      dotsHtml += '<span class="cdot" style="background:' + DOT_COLOR[dots[di]] + '"></span>';
    }
    var dd = cells[i].querySelector('.cdots');
    if (dd) dd.innerHTML = dotsHtml;
  }
}

function chShared(type, delta) {
  var s = getShared(selDate);
  s[type] = Math.max(0, (s[type]||0) + delta);
  var ids = {pee:'pee-v', poop:'poo-v', vomitUnknown:'vomit-unknown-v'};
  var el = document.getElementById(ids[type]);
  if (el) el.textContent = s[type];
  saveD(); renderCal_light();
}

function chVomit(delta) {
  var r = getRec(selDate);
  r.vomit = Math.max(0, (r.vomit||0) + delta);
  var el = document.getElementById('vom-v');
  if (el) el.textContent = r.vomit;
  saveD(); renderCal_light();
}

function saveWeight() {
  var r = getRec(selDate);
  var v = parseFloat(document.getElementById('w-inp').value);
  r.weight = isNaN(v) ? '' : v;
  saveD(); renderCal_light(); buildDayPanel();
}

function toggleMed(i) {
  var r = getRec(selDate);
  if (!r.meds) r.meds = {};
  var m = getCatMeds()[i];
  r.meds[m] = !r.meds[m];
  saveD(); buildDayPanel();
}

function saveDay() {
  var r = getRec(selDate);
  r.notes = document.getElementById('notes-inp').value;
  var v = parseFloat(document.getElementById('w-inp').value);
  r.weight = isNaN(v) ? '' : v;
  saveD(); renderCal_light();
  var b = document.getElementById('save-day-btn');
  b.textContent = '✓ 已儲存！'; b.style.background = 'var(--grn)';
  setTimeout(function() { b.textContent = '儲存紀錄'; b.style.background = ''; }, 1600);
}

// ===== CARE MODAL =====
function openCareModal(key) {
  curCareKey = key;
  var item = null;
  for (var i = 0; i < CARE_ITEMS.length; i++) if (CARE_ITEMS[i].key===key) { item=CARE_ITEMS[i]; break; }
  document.getElementById('mcare-title').textContent = '記錄 ' + item.name;
  document.getElementById('mcare-date').value = lastCareDate(key) || todayStr;
  openModal('modal-care');
}
function confirmCare() {
  var dt = document.getElementById('mcare-date').value;
  if (!dt) return;
  var r = getRec(dt);
  if (!r.care) r.care = {};
  r.care[curCareKey] = true;
  saveD(); closeModal('modal-care'); renderCal_light(); buildDayPanel();
}

// ===== CALORIE PAGE =====
function buildCaloriePage() {
  var pg = document.getElementById('pg-calorie');
  var presets = getCatPresets();

  // 月曆（簡版，同日曆頁）
  var first = new Date(viewY, viewM, 1).getDay();
  var dim = new Date(viewY, viewM+1, 0).getDate();
  var prev = new Date(viewY, viewM, 0).getDate();
  var cells = '';
  function mkCal2(d, ds, other) {
    var isTod = ds===todayStr, isSel = ds===selDate;
    var cls = 'cell' + (other?' other':'') + (isSel?' sel':isTod?' tod':'');
    var dots = getDots(ds);
    var dotsHtml = '';
    for (var di = 0; di < Math.min(dots.length,5); di++) dotsHtml += '<span class="cdot" style="background:'+DOT_COLOR[dots[di]]+'"></span>';
    return '<div class="' + cls + '" data-ds2="' + ds + '"><span class="cnum">' + d + '</span><div class="cdots">' + dotsHtml + '</div></div>';
  }
  for (var i = 0; i < first; i++) { var d2=prev-first+1+i; cells+=mkCal2(d2,fmtDate(new Date(viewY,viewM-1,d2)),true); }
  for (var d3=1;d3<=dim;d3++) cells+=mkCal2(d3,fmtDate(new Date(viewY,viewM,d3)),false);
  var rem=(first+dim)%7===0?0:7-(first+dim)%7;
  for (var i2=1;i2<=rem;i2++) { cells+=mkCal2(i2,fmtDate(new Date(viewY,viewM+1,i2)),true); }
  var dayLabels2=['日','一','二','三','四','五','六'];
  var hdr2='';
  for(var li=0;li<7;li++) hdr2+='<div class="cal-dl" style="'+(li===0?'color:var(--rose)':li===6?'color:var(--lav)':'')+'">' + dayLabels2[li]+'</div>';

  var daily = calcDaily(catObj()), ate = calcAte(selDate);
  var pct = Math.min(ate/daily*100, 100), over = ate > daily;
  var meals = getMeals(selDate);
  var d4 = new Date(selDate+'T00:00:00');
  var wk2=['日','一','二','三','四','五','六'];
  var dateLbl = (d4.getMonth()+1)+'月'+d4.getDate()+'日（'+wk2[d4.getDay()]+'）';

  var html = '';
  // 月曆導航
  html += '<div class="mnav" style="margin-top:4px">';
  html += '<button class="mnav-btn" id="cal2-prev">‹</button>';
  html += '<span style="font-size:15px;font-weight:600">' + viewY + ' 年 ' + MN[viewM] + '</span>';
  html += '<button class="mnav-btn" id="cal2-next">›</button></div>';
  html += '<div class="cal-wrap"><div class="cal-hdr">' + hdr2 + '</div>';
  html += '<div class="cal-grid" id="cal-grid2">' + cells + '</div></div>';

  // 選取日期的熱量
  html += '<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px">';
  html += '<span style="font-size:16px;font-weight:700">' + dateLbl + '</span>';
  if (selDate===todayStr) html += '<span class="sub">今天</span>';
  html += '</div>';
  html += '<div class="card2" style="margin-bottom:10px">';
  html += '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:2px">';
  html += '<span class="big">' + ate + '</span><span style="font-size:14px;color:var(--t2)">/ ' + daily + ' kcal</span>';
  html += '<span class="tag '+(over?'tag-r':pct>85?'tag-a':'tag-g')+'">'+(over?'超標':pct===0?'未開始':'正常')+'</span></div>';
  html += '<div class="prog-bar"><div class="prog-fill'+(over?' over':'')+'" style="width:'+pct+'%"></div></div>';
  html += '<div style="display:flex;justify-content:space-between"><span class="sub">已攝取 '+ate+' kcal</span>';
  html += '<span class="sub">'+(over?'超出':'剩餘')+' '+Math.abs(daily-ate).toFixed(1)+' kcal</span></div>';
  if (meals.length > 0) {
    html += '<div style="margin-top:10px;border-top:1px solid var(--bd);padding-top:8px">';
    for (var mi2 = 0; mi2 < meals.length; mi2++) {
      var mf2 = foodById(meals[mi2].foodId); if (!mf2) continue;
      html += '<div class="meal-row"><span style="font-size:12px;color:var(--t3);width:36px;flex-shrink:0">'+meals[mi2].time+'</span>';
      html += '<div style="flex:1"><div style="font-size:13px;font-weight:500">'+mf2.name+' ×'+meals[mi2].portions+'</div>';
      html += '<div class="sub">'+(mf2.grams*meals[mi2].portions).toFixed(0)+'g</div></div>';
      html += '<span style="font-size:12px;color:var(--t2)">'+(mf2.kcal*meals[mi2].portions).toFixed(1)+' kcal</span>';
      html += '<button class="btn-del cal2-meal-del" data-mid="'+meals[mi2].id+'">✕</button></div>';
    }
    html += '</div>';
  }
  html += '</div>';

  // 手動新增（先出現）
  html += '<div class="sec">新增用餐</div><div class="card">';
  html += '<div class="row"><span class="lbl">時間</span><input class="inp-sm" type="time" id="m-time" value="'+nowTime()+'" step="60" style="width:105px"></div>';
  html += '<div class="row"><span class="lbl">食物</span><select class="sel" id="m-food">';
  for (var fi2 = 0; fi2 < D.foods.length; fi2++) html += '<option value="'+D.foods[fi2].id+'">'+D.foods[fi2].name+'</option>';
  html += '</select></div>';
  html += '<div class="row"><span class="lbl">份數</span><input class="inp-sm" type="number" id="m-portions" value="1" min="0.5" step="0.5" style="width:70px"><span class="sub" id="m-hint" style="flex:1;text-align:right"></span></div>';
  html += '<div style="display:flex;align-items:center;gap:8px;margin-top:4px"><span class="sub" id="m-prev" style="flex:1"></span>';
  html += '<button class="btn btn-g" id="btn-save-preset" style="font-size:12px;padding:7px 10px">存為常用</button>';
  html += '<button class="btn btn-g" id="btn-add-meal-both" style="font-size:12px;padding:7px 10px" title="同時新增到兩隻貓">同步新增</button>';
  html += '<button class="btn" id="btn-add-meal">新增</button></div></div>';

  // 常用餐點（在手動新增下方）
  if (presets.length > 0) {
    html += '<div class="sec">常用餐點<span class="sec-note">點擊直接新增到 '+dateLbl+'</span></div>';
    for (var pi = 0; pi < presets.length; pi++) {
      var pr2 = presets[pi]; var pf2 = foodById(pr2.foodId); if (!pf2) continue;
      html += '<div style="display:flex;align-items:center;gap:8px;background:var(--cr);border:1px solid var(--bd);border-radius:var(--r);padding:9px 13px;margin-bottom:6px">';
      html += '<div style="flex:1"><div style="font-size:13px;font-weight:500">'+pr2.time+' · '+pf2.name+' ×'+pr2.portions+'</div>';
      html += '<div class="sub">'+(pf2.grams*pr2.portions).toFixed(0)+'g · '+(pf2.kcal*pr2.portions).toFixed(1)+' kcal</div></div>';
      html += '<button class="btn-del preset-del2" data-pi="'+pi+'" style="margin-right:4px" title="刪除常用">✕</button>';
      html += '<button class="btn btn-g cal2-preset-add-both" data-pi="'+pi+'" style="padding:6px 10px;font-size:12px">同步</button>';
      html += '<button class="btn cal2-preset-add" data-pi="'+pi+'" style="padding:7px 12px;font-size:13px">＋新增</button>';
      html += '</div>';
    }
  }

  html += '<div style="height:16px"></div>';
  pg.innerHTML = html;

  // 月曆點擊
  var cellEls2 = document.getElementById('cal-grid2').querySelectorAll('.cell');
  for (var ci2=0;ci2<cellEls2.length;ci2++) {
    cellEls2[ci2].addEventListener('click',(function(ds){
      return function(){selDate=ds;buildCaloriePage();document.getElementById('scroll').scrollTop=290;};
    })(cellEls2[ci2].getAttribute('data-ds2')));
  }
  document.getElementById('cal2-prev').onclick=function(){changeMonth(-1);buildCaloriePage();};
  document.getElementById('cal2-next').onclick=function(){changeMonth(1);buildCaloriePage();};

// ===== REPORT PAGE =====
function buildReportPage() {
  var pg = document.getElementById('pg-report');
  var DAYS = 30;
  var dates = [];
  for (var i = DAYS-1; i >= 0; i--) {
    var d = new Date(); d.setDate(d.getDate() - i);
    dates.push(fmtDate(d));
  }

  // collect per-cat data
  function catReport(cname) {
    var weights = [], waters = [], kcals = [], vomits = [];
    for (var i = 0; i < dates.length; i++) {
      var dt = dates[i];
      var rk = cname + '|' + dt;
      var r = D.records[rk];
      var s = D.shared[dt];
      var meals = D.meals[rk] || [];
      var ate = 0;
      for (var mi = 0; mi < meals.length; mi++) {
        var f = foodById(meals[mi].foodId);
        if (f) ate += f.kcal * meals[mi].portions;
      }
      var wTotal = 0;
      if (s && s.waterLogs) for (var wi = 0; wi < s.waterLogs.length; wi++) wTotal += s.waterLogs[wi].drunk||0;
      weights.push(r && r.weight ? parseFloat(r.weight) : null);
      waters.push(wTotal > 0 ? wTotal : null);
      kcals.push(ate > 0 ? Math.round(ate*10)/10 : null);
      vomits.push(r && r.vomit > 0 ? r.vomit : 0);
    }
    return {weights:weights, waters:waters, kcals:kcals, vomits:vomits};
  }

  function sparkline(vals, color, unit, maxOverride) {
    var nonNull = vals.filter(function(v){return v!==null && v>0;});
    if (nonNull.length === 0) return '<div class="empty" style="padding:8px 0;font-size:12px">無資料</div>';
    var max = maxOverride || Math.max.apply(null, nonNull);
    var min = 0;
    var W = 280, H = 60, pad = 4;
    var svg = '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" style="display:block">';
    // grid lines
    svg += '<line x1="0" y1="' + (H-pad) + '" x2="' + W + '" y2="' + (H-pad) + '" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>';
    svg += '<line x1="0" y1="' + ((H-pad)/2) + '" x2="' + W + '" y2="' + ((H-pad)/2) + '" stroke="rgba(0,0,0,0.04)" stroke-width="1" stroke-dasharray="3,3"/>';
    // bars
    var bw = Math.floor(W / vals.length) - 1;
    for (var i = 0; i < vals.length; i++) {
      if (vals[i] === null || vals[i] === 0) continue;
      var bh = Math.max(3, Math.round(((vals[i]-min)/(max-min||1)) * (H-pad*2)));
      var x = Math.round(i * W / vals.length);
      var y = H - pad - bh;
      svg += '<rect x="' + x + '" y="' + y + '" width="' + bw + '" height="' + bh + '" rx="2" fill="' + color + '" opacity="0.8"/>';
    }
    svg += '</svg>';
    var avg = nonNull.length ? (nonNull.reduce(function(a,b){return a+b;},0)/nonNull.length) : 0;
    var latest = null;
    for (var j = vals.length-1; j >= 0; j--) { if (vals[j] !== null && vals[j] > 0) { latest = vals[j]; break; } }
    return svg + '<div style="display:flex;justify-content:space-between;margin-top:4px">'
      + '<span class="sub">平均 ' + avg.toFixed(1) + ' ' + unit + '</span>'
      + (latest !== null ? '<span class="sub">最新 ' + latest + ' ' + unit + '</span>' : '')
      + '</div>';
  }

  function lineChart(vals, color, unit) {
    var nonNull = vals.map(function(v,i){return v!==null?{i:i,v:v}:null;}).filter(Boolean);
    if (nonNull.length < 2) return '<div class="empty" style="padding:8px 0;font-size:12px">資料不足（需至少2筆）</div>';
    var max = Math.max.apply(null, nonNull.map(function(p){return p.v;}));
    var min = Math.min.apply(null, nonNull.map(function(p){return p.v;}));
    var range = max - min || 0.1;
    var W = 280, H = 70, pad = 8;
    var pts = nonNull.map(function(p) {
      var x = Math.round(p.i * W / (vals.length-1));
      var y = Math.round(pad + (1-(p.v-min)/range) * (H-pad*2));
      return x + ',' + y;
    });
    var svg = '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" style="display:block">';
    svg += '<polyline points="' + pts.join(' ') + '" fill="none" stroke="' + color + '" stroke-width="2" stroke-linejoin="round"/>';
    nonNull.forEach(function(p,pi) {
      var x = Math.round(p.i * W / (vals.length-1));
      var y = Math.round(pad + (1-(p.v-min)/range) * (H-pad*2));
      svg += '<circle cx="' + x + '" cy="' + y + '" r="3" fill="' + color + '"/>';
    });
    svg += '</svg>';
    var latest = nonNull[nonNull.length-1].v;
    var prev = nonNull.length >= 2 ? nonNull[nonNull.length-2].v : null;
    var diff = prev !== null ? (latest - prev) : null;
    return svg + '<div style="display:flex;justify-content:space-between;margin-top:4px">'
      + '<span class="sub">最低 ' + min.toFixed(2) + ' ' + unit + '</span>'
      + '<span class="sub">最新 ' + latest.toFixed(2) + (diff!==null?' (' + (diff>=0?'+':'') + diff.toFixed(2) + ')':'') + ' ' + unit + '</span>'
      + '</div>';
  }

  var html = '<div class="sec" style="margin-top:4px">近30天報表 — ' + catN() + '</div>';

  var rep = catReport(catN());

  // Weight
  html += '<div class="card2" style="margin-bottom:10px">';
  html += '<div style="font-size:13px;font-weight:600;margin-bottom:8px">⚖️ 體重趨勢（kg）</div>';
  html += lineChart(rep.weights, '#7BAF82', 'kg');
  html += '</div>';

  // Water
  html += '<div class="card2" style="margin-bottom:10px">';
  html += '<div style="font-size:13px;font-weight:600;margin-bottom:8px">💧 每日飲水（ml）<span class="sec-note">全貓共用</span></div>';
  html += sparkline(rep.waters, '#5BBCB0', 'ml');
  html += '</div>';

  // Kcal
  html += '<div class="card2" style="margin-bottom:10px">';
  html += '<div style="font-size:13px;font-weight:600;margin-bottom:8px">🍽️ 每日熱量（kcal）</div>';
  var daily = calcDaily(catObj());
  html += sparkline(rep.kcals, '#E8829A', 'kcal', daily * 1.5);
  // target line hint
  html += '<div class="sub" style="margin-top:2px">每日目標：' + daily + ' kcal</div>';
  html += '</div>';

  // Vomit
  var totalVomit = rep.vomits.reduce(function(a,b){return a+b;},0);
  var vomitDays = rep.vomits.filter(function(v){return v>0;}).length;
  html += '<div class="card2" style="margin-bottom:10px">';
  html += '<div style="font-size:13px;font-weight:600;margin-bottom:8px">🤢 嘔吐紀錄</div>';
  if (totalVomit === 0) {
    html += '<div class="empty" style="padding:8px 0;font-size:12px">近30天無嘔吐紀錄 ✓</div>';
  } else {
    html += sparkline(rep.vomits, '#E05555', '次');
    html += '<div class="sub" style="margin-top:4px">共 ' + totalVomit + ' 次，' + vomitDays + ' 天有嘔吐</div>';
  }
  html += '</div>';

  // Recent weight table
  var wEntries = [];
  var rks = Object.keys(D.records);
  for (var ri = 0; ri < rks.length; ri++) {
    if (rks[ri].indexOf(catN()+'|')===0 && D.records[rks[ri]].weight) {
      wEntries.push({dt: rks[ri].split('|')[1], w: D.records[rks[ri]].weight});
    }
  }
  wEntries.sort(function(a,b){return b.dt>a.dt?1:-1;});
  wEntries = wEntries.slice(0,10);
  if (wEntries.length > 0) {
    html += '<div class="sec">體重紀錄明細</div><div class="card">';
    for (var wi2 = 0; wi2 < wEntries.length; wi2++) {
      var diff2 = wi2 < wEntries.length-1 ? (wEntries[wi2].w - wEntries[wi2+1].w) : null;
      var diffStr = diff2 !== null ? ' <span style="color:' + (diff2>0?'var(--red)':'var(--grn)') + ';font-size:11px">(' + (diff2>0?'+':'') + parseFloat(diff2).toFixed(2) + 'kg)</span>' : '';
      html += '<div class="wh-row"><span style="color:var(--t3)">' + wEntries[wi2].dt + '</span><span style="font-weight:600">' + wEntries[wi2].w + ' kg' + diffStr + '</span></div>';
    }
    html += '</div>';
  }

  html += '<div style="height:20px"></div>';
  pg.innerHTML = html;
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(function(){});

init();
</script>
</body>
</html>
